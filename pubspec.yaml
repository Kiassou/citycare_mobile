name: citycare_mobile
description: "CityCare - Gestion des signalements urbains"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  animate_do: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1  # ← 1. ICI dans dev_dependencies

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

# 2. ICI à la RACINE (pas sous flutter!)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/citycare.png"
  min_sdk_android: 21
